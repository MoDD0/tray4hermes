# Pre-commit hooks — run before every commit.
# Install: `uv pip install -e ".[dev]" && pre-commit install`
# Manual run: `pre-commit run --all-files`

repos:
  - repo: local
    hooks:
      - id: tray4hermes-semver
        name: tray4hermes SemVer policy check
        entry: python scripts/versioning.py --prepare-commit-msg
        language: system
        stages: [prepare-commit-msg]
        always_run: true
        pass_filenames: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
        # Catches accidental commits of SSH keys, API tokens, etc.
      - id: end-of-file-fixer
      - id: trailing-whitespace